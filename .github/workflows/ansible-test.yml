---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '12 7 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity (ansible-core ${{ matrix.ansible }})
    strategy:
      matrix:
        ansible:
          - stable-2.19
          - stable-2.20
          - stable-2.21
          - milestone
    runs-on: ubuntu-latest
    steps:
      - name: Perform sanity testing
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          ansible-core-version: ${{ matrix.ansible }}
          testing-type: sanity
          test-deps: community.vmware
          pull-request-change-detection: false
          coverage: never

  units:
    name: Units (ansible-core ${{ matrix.ansible }})
    strategy:
      fail-fast: true
      matrix:
        ansible:
          - stable-2.19
          - stable-2.20
          - stable-2.21
          - milestone
    runs-on: ubuntu-latest
    steps:
      - name: Perform unit testing
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          ansible-core-version: ${{ matrix.ansible }}
          testing-type: units
          test-deps: community.vmware
          pull-request-change-detection: false
          coverage: never

  check:
    if: always()
    needs:
      - sanity
      - units
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
